name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    name: Quality
    if: "!contains(github.event.head_commit.message, 'chore(release):')"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.22.0]
    env:
      # Re-enable Vercel preview E2E by setting to 'true' (Cypress is off until preview issues are resolved).
      CYPRESS_VERCEL_E2E_ENABLED: 'false'
      # Path under preview host for curl debug (matches status.spec.ts).
      DEBUG_WIKI_PATH: /cpv/wiki/spaces/konviw/pages/770408500
      CPV_CONFLUENCE_API_TOKEN: ${{ secrets.CPV_CONFLUENCE_API_TOKEN }}
      CPV_CONFLUENCE_API_USERNAME: ${{ secrets.CPV_CONFLUENCE_API_USERNAME }}
      CPV_CONFLUENCE_BASE_URL: ${{ secrets.CPV_CONFLUENCE_BASE_URL }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      CPV_JIRA_READER_API_USERNAME: ${{ secrets.CPV_JIRA_READER_API_USERNAME }}
      CPV_JIRA_READER_API_TOKEN: ${{ secrets.CPV_JIRA_READER_API_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Prod build
        run: npm run build

      - name: Install Vercel CLI
        if: ${{ matrix.node-version == '22.22.0' }}
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        if: ${{ matrix.node-version == '22.22.0' }}
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        if: ${{ matrix.node-version == '22.22.0' }}
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        id: vercel-deploy
        if: ${{ matrix.node-version == '22.22.0' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          PREVIEW_URL=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "PREVIEW_URL=$PREVIEW_URL"
          echo "PREVIEW_URL=$PREVIEW_URL" >> $GITHUB_OUTPUT
          echo "DEPLOYMENT_CREATED=true" >> $GITHUB_OUTPUT

      - name: Debug — env presence vs vercel pull (no secret values)
        if: ${{ matrix.node-version == '22.22.0' && steps.vercel-deploy.outputs.DEPLOYMENT_CREATED == 'true' }}
        run: |
          echo "=== GitHub Actions job env: SET or UNSET (values never printed) ==="
          for name in CPV_BASEPATH CPV_BASEHOST CPV_CONFLUENCE_BASE_URL CPV_CONFLUENCE_API_USERNAME CPV_CONFLUENCE_API_TOKEN CPV_KONVIW_PRIVATE_PAGE CPV_CONFLUENCE_API_TIMEOUT CPV_JIRA_READER_API_USERNAME CPV_JIRA_READER_API_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            eval "val=\"\${$name:-}\""
            if [ -n "$val" ]; then echo "$name=SET"; else echo "$name=UNSET"; fi
          done
          echo "=== Variable NAMES from .vercel/.env.preview.local (values omitted) ==="
          if [ -f .vercel/.env.preview.local ]; then
            cut -d= -f1 .vercel/.env.preview.local | grep -v '^#' | sed '/^$/d' | sort -u
          else
            echo "(no .vercel/.env.preview.local)"
            ls -la .vercel 2>/dev/null || true
          fi

      - name: Debug — probe preview /cpv/health
        if: ${{ matrix.node-version == '22.22.0' && steps.vercel-deploy.outputs.DEPLOYMENT_CREATED == 'true' }}
        run: |
          PREVIEW_URL="${{ steps.vercel-deploy.outputs.PREVIEW_URL }}"
          echo "GET $PREVIEW_URL/cpv/health"
          curl -sS -w "\nHTTP_CODE:%{http_code}\n" "$PREVIEW_URL/cpv/health" | head -c 4096
          echo ""

      - name: Debug — probe sample wiki page (body capped)
        if: ${{ matrix.node-version == '22.22.0' && steps.vercel-deploy.outputs.DEPLOYMENT_CREATED == 'true' }}
        env:
          DEBUG_WIKI_PATH: ${{ env.DEBUG_WIKI_PATH }}
        run: |
          PREVIEW_URL="${{ steps.vercel-deploy.outputs.PREVIEW_URL }}"
          WIKI_URL="${PREVIEW_URL}${DEBUG_WIKI_PATH}"
          echo "GET $WIKI_URL (with slug)"
          curl -sS -i "$WIKI_URL" | head -c 4096
          echo ""
          WIKI_URL_NO_SLUG="${PREVIEW_URL}/cpv/wiki/spaces/KONVIW/pages/77660200"
          echo "GET $WIKI_URL_NO_SLUG (page id only)"
          curl -sS -i "$WIKI_URL_NO_SLUG" | head -c 4096
          echo ""

      - name: Run Cypress Tests
        uses: cypress-io/github-action@v2
        if: ${{ matrix.node-version == '22.22.0' && steps.vercel-deploy.outputs.DEPLOYMENT_CREATED == 'true' && env.CYPRESS_VERCEL_E2E_ENABLED == 'true' }}
        with:
          browser: chrome
          config-file: cypress.config.js
        env:
          CYPRESS_BASE_URL: ${{ steps.vercel-deploy.outputs.PREVIEW_URL }}/cpv

      - name: Upload Cypress Screenshots
        uses: actions/upload-artifact@v4
        if: ${{ failure() && env.CYPRESS_VERCEL_E2E_ENABLED == 'true' }}
        with:
          name: cypress-screenshots-artifacts
          retention-days: 5
          path: tests/e2e/cypress/cypress-image-diff-screenshots/

      - name: Upload Cypress Videos
        uses: actions/upload-artifact@v4
        if: ${{ always() && env.CYPRESS_VERCEL_E2E_ENABLED == 'true' }}
        with:
          name: cypress-videos-artifacts
          retention-days: 1
          path: tests/e2e/cypress/videos/

  release:
    name: Release
    # needs: quality
    # https://github.community/t/how-do-i-specify-job-dependency-running-in-another-workflow/16482
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    env:
      CACHE_IMAGE: sanofiiadc/konviw
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "22.22.0"

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-22.22.0-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-22.22.0-npm-

      - name: Install dependencies
        run: npm ci

      - name: Install semantic-release
        run: npm install -g semantic-release@19.0.5 @semantic-release/github @semantic-release/git@10.0.1 @semantic-release/changelog@6.0.1 @semantic-release/exec@6.0.3

      # - name: Log into Docker registry
      #   uses: azure/docker-login@v1
      #   with:
      #     username: ${{ secrets.SANOFI_DOCKER_HUB_USERNAME }}
      #     password: ${{ secrets.SANOFI_DOCKER_HUB_TOKEN }}

      # - name: Pull Docker cache image
      #   run: docker pull --quiet ${CACHE_IMAGE} 2>/dev/null || true

      - name: Semantic Release
        env:
          # MDF_BRANCH_TAG: latest
          # MDF_BUILD_PARAMS: --cache-from ${{ env.CACHE_IMAGE }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
